name: 🚀 Build Financial Buddy APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # Manual trigger from Actions tab

jobs:

  # ══════════════════════════════════════════════════════
  #  JOB 1 — BUILD
  # ══════════════════════════════════════════════════════
  build:
    name: 🔨 Build APK
    runs-on: ubuntu-latest

    steps:

      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Installs Gradle directly on the runner so we don't need the wrapper files
      - name: 🐘 Set up Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      # ── Build Debug APK (Using 'gradle' instead of './gradlew') ──
      - name: 🔨 Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      # ── Build Release APK (Using 'gradle' instead of './gradlew') ──
      - name: 🏗️ Build Release APK
        run: gradle assembleRelease --no-daemon --stacktrace

      # ── Sign Release APK ───────────────────────────────
      # Requires 4 secrets added to your GitHub repo:
      #   KEYSTORE_BASE64, KEY_ALIAS, KEYSTORE_PASSWORD, KEY_PASSWORD
      # See README_GITHUB.md for how to create and upload them
      - name: 🔑 Sign Release APK
        id: sign_apk
        uses: r0adkll/sign-android-release@v1
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64:    ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD:  ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
          BUILD_TOOLS_VERSION: "34.0.0"
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias:            ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword:      ${{ secrets.KEY_PASSWORD }}
        continue-on-error: true

      # ── Collect all APKs ───────────────────────────────
      - name: 📁 Collect APKs
        run: |
          mkdir -p artifacts

          cp app/build/outputs/apk/debug/app-debug.apk \
             artifacts/FinancialBuddy-debug.apk

          if [ -f "${{ steps.sign_apk.outputs.signedReleaseFile }}" ]; then
            cp "${{ steps.sign_apk.outputs.signedReleaseFile }}" \
               artifacts/FinancialBuddy-release-signed.apk
          elif [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk \
               artifacts/FinancialBuddy-release-unsigned.apk
          fi

          ls -lh artifacts/

      # ── Upload Debug APK ───────────────────────────────
      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FinancialBuddy-Debug
          path: artifacts/FinancialBuddy-debug.apk
          retention-days: 30

      # ── Upload Release APK ─────────────────────────────
      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: FinancialBuddy-Release
          path: artifacts/FinancialBuddy-release*.apk
          retention-days: 30
          if-no-files-found: warn

      # ── Build summary in Actions UI ────────────────────
      - name: 📊 Build Summary
        if: always()
        run: |
          echo "## 📱 Financial Buddy Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| APK | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|" >> $GITHUB_STEP_SUMMARY
          for f in artifacts/*.apk; do
            [ -f "$f" ] || continue
            echo "| $(basename $f) | $(du -sh $f | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⬇️ Download from the **Artifacts** section above" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install on Android" >> $GITHUB_STEP_SUMMARY
          echo "1. Download APK → transfer to phone" >> $GITHUB_STEP_SUMMARY
          echo "2. Settings → Security → Install unknown apps → **Allow**" >> $GITHUB_STEP_SUMMARY
          echo "3. Tap APK to install" >> $GITHUB_STEP_SUMMARY
          echo "4. Settings → Notification access → **Enable Financial Buddy**" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════
  #  JOB 2 — GITHUB RELEASE
  #  Triggers only when you push a version tag:
  #    git tag v1.0.0
  #    git push --tags
  # ══════════════════════════════════════════════════════
  release:
    name: 🎉 Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⬇️ Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Financial Buddy ${{ github.ref_name }}"
          body: |
            ## 📱 Financial Buddy ${{ github.ref_name }}

            ### Install
            1. Download APK below
            2. Android: **Settings → Security → Install unknown apps → Allow**
            3. Tap APK to install
            4. **Settings → Notification access → Enable Financial Buddy** ← Required for auto-intercept

            ### Features
            - 🤖 Auto-intercepts Google Pay & bank notifications
            - 📅 Date auto-filled via `Date.now()` — no manual entry
            - 💳 Amount + merchant pre-filled from notification
            - 🗄️ 10 default budget categories (fully customisable)
            - 📊 Real-time spending bars per category
            - 📒 Full transaction ledger
            - 📤 JSON export

            > Requires Android 8.0+
          files: release-files/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
